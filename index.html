<body>

<h1>Blocks</h1>

<div id="game-wrapper">

    <!-- GAME -->
    <div id="game-container">
        <canvas id="board" width="260" height="520"></canvas>

        <div id="info">
            Score: <span id="score">0</span> &nbsp; | &nbsp;
            Level: <span id="level">1</span>
        </div>

        <div id="high-score-box">
            High Score: <span id="high-score">0</span>
        </div>
    </div>

    <!-- RESTART BUTTON -->
    <button id="restart">Restart</button>

    <!-- CONTROLS -->
    <div id="controls">
        <div class="control-row">
            <button class="control-btn" id="btn-hold">Hold</button>
            <button class="control-btn" id="btn-rot">Rotate</button>
            <button class="control-btn" id="btn-drop">Drop</button>
        </div>

        <div class="control-row">
            <button class="control-btn" id="btn-left">←</button>
            <button class="control-btn" id="btn-down">↓</button>
            <button class="control-btn" id="btn-right">→</button>
        </div>
    </div>

</div>
   <div id="game-over-popup">
    <div id="popup-box">
        <h2>GAME OVER</h2>
        <p>GAME OVER CATHY – BETTER LUCK NEXT TIME</p>
        <button id="popup-restart">Restart</button>
    </div>
</div>
<script>

</body>

     /* -----------------------------------------
   CANVAS + CONTEXT
----------------------------------------- */
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const restartBtn = document.getElementById("restart");

/* -----------------------------------------
   GAME CONSTANTS
----------------------------------------- */
const COLS = 10;
const ROWS = 20;
const BLOCK = canvas.width / COLS;

const COLORS = {
    I: "#22d3ee",
    J: "#3b82f6",
    L: "#f97316",
    O: "#eab308",
    S: "#22c55e",
    T: "#a855f7",
    Z: "#ef4444"
};

const SHAPES = {
    I: [[1,1,1,1]],
    J: [[1,0,0],[1,1,1]],
    L: [[0,0,1],[1,1,1]],
    O: [[1,1],[1,1]],
    S: [[0,1,1],[1,1,0]],
    T: [[0,1,0],[1,1,1]],
    Z: [[1,1,0],[0,1,1]]
};

/* -----------------------------------------
   GAME STATE
----------------------------------------- */
let board;
let current;
let score = 0;
let level = 1;
let gameOver = false;

let dropInterval = 600;
let lastTime = 0;
let dropCounter = 0;

let holdPiece = null;
let canHold = true;

/* -----------------------------------------
   HIGH SCORE SYSTEM
----------------------------------------- */
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("high-score").textContent = highScore;

function updateHighScore() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
        document.getElementById("high-score").textContent = highScore;
    }
}

/* -----------------------------------------
   BOARD SETUP
----------------------------------------- */
function createBoard() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
}

/* -----------------------------------------
   PIECE GENERATION
----------------------------------------- */
function randomPiece() {
    const keys = Object.keys(SHAPES);
    const type = keys[Math.floor(Math.random() * keys.length)];
    return {
        shape: SHAPES[type],
        color: COLORS[type],
        x: 3,
        y: 0
    };
}

/* -----------------------------------------
   DRAWING
----------------------------------------- */
function drawBlock(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);

    ctx.strokeStyle = "#0f172a";
    ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
}

function drawBoard() {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (board[r][c] !== 0) {
                drawBlock(c, r, board[r][c]);
            }
        }
    }
}

function drawPiece() {
    current.shape.forEach((row, r) => {
        row.forEach((value, c) => {
            if (value) {
                drawBlock(current.x + c, current.y + r, current.color);
            }
        });
    });
}

/* -----------------------------------------
   COLLISION CHECK
----------------------------------------- */
function collision(x, y, shape) {
    for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
            if (shape[r][c]) {
                let newX = x + c;
                let newY = y + r;

                if (
                    newX < 0 ||
                    newX >= COLS ||
                    newY >= ROWS ||
                    (newY >= 0 && board[newY][newX] !== 0)
                ) {
                    return true;
                }
            }
        }
    }
    return false;
}

/* -----------------------------------------
   LOCK PIECE + CLEAR LINES
----------------------------------------- */
function lockPiece() {
    current.shape.forEach((row, r) => {
        row.forEach((value, c) => {
            if (value) {
                board[current.y + r][current.x + c] = current.color;
            }
        });
    });

    clearLines();
    current = randomPiece();
    canHold = true;

  if (collision(current.x, current.y, current.shape)) {
    gameOver = true;
    document.getElementById("game-over-popup").style.display = "flex";
    return; // ← THIS IS REQUIRED
}


}

function clearLines() {
    let lines = 0;

    for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(cell => cell !== 0)) {
            board.splice(r, 1);
            board.unshift(Array(COLS).fill(0));
            lines++;
            r++;
        }
    }

    if (lines > 0) {
        score += lines * 100;
        scoreEl.textContent = score;

        updateHighScore();

        level = Math.floor(score / 500) + 1;
        levelEl.textContent = level;

        dropInterval = Math.max(100, 600 - (level - 1) * 50);
    }
}

/* -----------------------------------------
   MOVEMENT
----------------------------------------- */
function move(dir) {
    if (!collision(current.x + dir, current.y, current.shape)) {
        current.x += dir;
    }
}

function softDrop() {
    if (!collision(current.x, current.y + 1, current.shape)) {
        current.y++;
    } else {
        lockPiece();
    }
}

function hardDrop() {
    while (!collision(current.x, current.y + 1, current.shape)) {
        current.y++;
    }
    lockPiece();
}

function rotatePiece() {
    const rotated = current.shape[0].map((_, i) =>
        current.shape.map(row => row[i]).reverse()
    );

    if (!collision(current.x, current.y, rotated)) {
        current.shape = rotated;
    }
}

/* -----------------------------------------
   HOLD SYSTEM
----------------------------------------- */
function holdCurrentPiece() {
    if (!canHold) return;

    if (holdPiece === null) {
        holdPiece = current;
        current = randomPiece();
    } else {
        let temp = current;
        current = holdPiece;
        holdPiece = temp;
    }

    current.x = 3;
    current.y = 0;
    canHold = false;
}

/* -----------------------------------------
   GAME LOOP
----------------------------------------- */
function update(time = 0) {
    if (gameOver) return;

    const delta = time - lastTime;
    lastTime = time;

    dropCounter += delta;
    if (dropCounter > dropInterval) {
        softDrop();
        dropCounter = 0;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBoard();
    drawPiece();

    requestAnimationFrame(update);
}

/* -----------------------------------------
   RESET GAME
----------------------------------------- */
function resetGame() {
    board = createBoard();
    current = randomPiece();
    score = 0;
    level = 1;
    gameOver = false;
    dropInterval = 600;
    dropCounter = 0;
    lastTime = 0;
    holdPiece = null;
    canHold = true;

    scoreEl.textContent = score;
    levelEl.textContent = level;

    update();
}

/* -----------------------------------------
   BUTTON CONTROLS
----------------------------------------- */
document.getElementById("btn-left").addEventListener("click", () => move(-1));
document.getElementById("btn-right").addEventListener("click", () => move(1));
document.getElementById("btn-down").addEventListener("click", softDrop);
document.getElementById("btn-rot").addEventListener("click", rotatePiece);
document.getElementById("btn-drop").addEventListener("click", hardDrop);
document.getElementById("btn-hold").addEventListener("click", holdCurrentPiece);

restartBtn.addEventListener("click", resetGame);



/* -----------------------------------------
   START GAME
----------------------------------------- */
resetGame();


    /* -----------------------------
   AUTO‑SCALE CANVAS TO SCREEN
------------------------------*/
function autoScale() {
  const container = document.getElementById("game-container");
  const maxWidth = window.innerWidth * 0.95;
  const scale = Math.min(maxWidth / container.offsetWidth, 1);
  container.style.transform = `scale(${scale})`;
}

window.addEventListener("resize", autoScale);
window.addEventListener("orientationchange", autoScale);


/* -----------------------------
   TOUCH‑HOLD REPEAT MOVEMENT
------------------------------*/
let holdInterval = null;

function startHold(action) {
  action(); // immediate move
  holdInterval = setInterval(action, 80); // repeat every 80ms
}

function stopHold() {
  clearInterval(holdInterval);
  holdInterval = null;
}

// LEFT HOLD
document.getElementById("btn-left").addEventListener("touchstart", e => {
  e.preventDefault();
  startHold(() => move(-1));
});
document.getElementById("btn-left").addEventListener("touchend", stopHold);

// RIGHT HOLD
document.getElementById("btn-right").addEventListener("touchstart", e => {
  e.preventDefault();
  startHold(() => move(1));
});
document.getElementById("btn-right").addEventListener("touchend", stopHold);

// DOWN HOLD (optional soft‑drop hold)
document.getElementById("btn-down").addEventListener("touchstart", e => {
  e.preventDefault();
  startHold(() => softDrop());
});
document.getElementById("btn-down").addEventListener("touchend", stopHold);
     document.getElementById("popup-restart").addEventListener("click", () => {
    document.getElementById("game-over-popup").style.display = "none";
    resetGame();
});
     document.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("touchstart", e => e.preventDefault(), { passive: false });
});




    resetGame();
  </script>
</body>
