<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blocks</title>

<style>

/* ------------------------------
   GLOBAL
------------------------------ */

body {
    font-family: Arial, sans-serif;
    background: #f0f9ff;
    margin: 0;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    font-size: 2.4rem;
    color: #0f172a;
}

/* ------------------------------
   LAYOUT
------------------------------ */

#game-wrapper {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 10px;
}

/* ------------------------------
   GAME CONTAINER
------------------------------ */

#game-container {
    padding: 16px;
    background: #E8FFF8;
    border: 4px solid #A4E4C0;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

canvas {
    background: #020617;
    border: 4px solid #0f172a;
    border-radius: 10px;
    display: block; /* FIXES INVISIBLE BLOCKS */
}

/* ------------------------------
   SCORE + LEVEL
------------------------------ */

#info {
    margin-top: 12px;
    font-size: 1.2rem;
    font-weight: bold;
}

/* ------------------------------
   SIDE PANEL
------------------------------ */

#side-panel {
    display: flex;
    flex-direction: column;
    justify-content: center; /* vertically aligns with game */
    gap: 20px;
    width: 160px;
}

#high-score-box {
    background: #fff7ed;
    border: 2px solid #f97316;
    border-radius: 12px;
    padding: 12px;
    font-size: 1.3rem;
    font-weight: bold;
    color: #b45309;
    min-width: 140px; /* room for 4 digits */
}

/* ------------------------------
   BUTTONS
------------------------------ */

button {
    font-size: 1.2rem;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    touch-action: manipulation;
}

#exit-btn {
    background: #f97316;
    color: white;
}

#exit-btn:active {
    transform: scale(0.96);
}

#restart {
    background: #22c55e;
    color: white;
    margin-top: 20px;
}

/* ------------------------------
   CONTROLS
------------------------------ */

#controls {
    margin-top: 20px;
}

.control-row {
    margin-top: 10px;
}

.control-btn {
    background: #fef3c7;
    border: 2px solid #fcd34d;
    padding: 10px 16px;
    font-size: 1.1rem;
    border-radius: 10px;
    margin: 5px;
}

</style>
</head>

<body>

<h1>Blocks</h1>

<div id="game-wrapper">

    <!-- LEFT SIDE: GAME -->
    <div id="game-container">
        <canvas id="board" width="260" height="520"></canvas>

        <div id="info">
            Score: <span id="score">0</span> &nbsp; | &nbsp;
            Level: <span id="level">1</span>
        </div>
    </div>

    <!-- RIGHT SIDE: HIGH SCORE + EXIT -->
    <div id="side-panel">
        <div id="high-score-box">
            High Score: <span id="high-score">0</span>
        </div>

        <button id="exit-btn">Exit Game</button>
    </div>

</div>

<!-- RESTART BUTTON -->
<button id="restart">Restart</button>

<!-- CONTROLS -->
<div id="controls">
    <div class="control-row">
        <button class="control-btn" id="btn-hold">Hold</button>
        <button class="control-btn" id="btn-rot">Rotate</button>
        <button class="control-btn" id="btn-drop">Drop</button>
    </div>

    <div class="control-row">
        <button class="control-btn" id="btn-left">←</button>
        <button class="control-btn" id="btn-down">↓</button>
        <button class="control-btn" id="btn-right">→</button>
    </div>
</div>

</body>
</html>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const restartBtn = document.getElementById("restart");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = canvas.width / COLS;

    const COLORS = {
      I: "#22d3ee",
      J: "#3b82f6",
      L: "#f97316",
      O: "#eab308",
      S: "#22c55e",
      T: "#a855f7",
      Z: "#ef4444"
    };

    const SHAPES = {
      I: [[1,1,1,1]],
      J: [[1,0,0],[1,1,1]],
      L: [[0,0,1],[1,1,1]],
      O: [[1,1],[1,1]],
      S: [[0,1,1],[1,1,0]],
      T: [[0,1,0],[1,1,1]],
      Z: [[1,1,0],[0,1,1]]
    };

    let board, current, score, level, gameOver, dropInterval, lastTime, dropCounter;

    let holdPiece = null;
    let canHold = true;
    // --------------------
// HIGH SCORE SYSTEM
// --------------------
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("high-score").textContent = highScore;

function updateHighScore() {
  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
    document.getElementById("high-score").textContent = highScore;
  }
}


    function createBoard() {
      const grid = [];
      for (let r = 0; r < ROWS; r++) {
        grid.push(new Array(COLS).fill(null));
      }
      return grid;
    }

    function randomPiece() {
      const keys = Object.keys(SHAPES);
      const type = keys[Math.floor(Math.random() * keys.length)];
      return {
        type,
        shape: SHAPES[type].map(row => [...row]),
        row: 0,
        col: Math.floor(COLS / 2) - 2

      };
    }

    function resetGame() {
      board = createBoard();
      current = randomPiece();
      score = 0;
      level = 1;
      gameOver = false;
      dropInterval = 600;
      lastTime = 0;
      dropCounter = 0;
      holdPiece = null;
      canHold = true;
      scoreEl.textContent = score;
      levelEl.textContent = level;
      update();
    }

    function drawBlock(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
      ctx.strokeStyle = "#020617";
      ctx.lineWidth = 1;
      ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = board[r][c];
          if (cell) drawBlock(c, r, COLORS[cell]);
        }
      }

      const color = COLORS[current.type];
      current.shape.forEach((row, r) => {
        row.forEach((val, c) => {
          if (val) drawBlock(current.col + c, current.row + r, color);
        });
      });
    }

    function collide(board, piece) {
      for (let r = 0; r < piece.shape.length; r++) {
        for (let c = 0; c < piece.shape[r].length; c++) {
          if (!piece.shape[r][c]) continue;
          const newR = piece.row + r;
          const newC = piece.col + c;
          if (newR < 0 || newR >= ROWS || newC < 0 || newC >= COLS) return true;
          if (board[newR][newC]) return true;
        }
      }
      return false;
    }

    function merge(board, piece) {
      piece.shape.forEach((row, r) => {
        row.forEach((val, c) => {
          if (val) board[piece.row + r][piece.col + c] = piece.type;
        });
      });
    }

    function rotate(shape) {
      const rows = shape.length;
      const cols = shape[0].length;
      const res = [];
      for (let c = 0; c < cols; c++) {
        const newRow = [];
        for (let r = rows - 1; r >= 0; r--) newRow.push(shape[r][c]);
        res.push(newRow);
      }
      return res;
    }

    function rotatePiece() {
  const oldShape = current.shape;
  const rotated = rotate(current.shape);

  // Try normal rotation
  current.shape = rotated;
  if (!collide(board, current)) return;

  // Try wall kick left
  current.col--;
  if (!collide(board, current)) return;

  // Try wall kick right
  current.col += 2;
  if (!collide(board, current)) return;

  // Revert if all fail
  current.col--;
  current.shape = oldShape;
}

    function move(dx) {
      current.col += dx;
      if (collide(board, current)) current.col -= dx;
    }

    function softDrop() {
      current.row++;
      if (collide(board, current)) {
        current.row--;
        lockPiece();
      }
    }

    function hardDrop() {
      while (!collide(board, current)) current.row++;
      current.row--;
      lockPiece();
    }

    function holdCurrentPiece() {
      if (!canHold) return;

      if (holdPiece === null) {
        holdPiece = current.type;
        current = randomPiece();
      } else {
        const temp = current.type;
        current = {
          type: holdPiece,
          shape: SHAPES[holdPiece].map(r => [...r]),
          row: 0,
          col: Math.floor(COLS / 2) - 2

        };
        holdPiece = temp;
      }

      canHold = false;
    }

    function clearLines() {
      let lines = 0;
      outer: for (let r = ROWS - 1; r >= 0; r--) {
        for (let c = 0; c < COLS; c++) {
          if (!board[r][c]) continue outer;
        }
        board.splice(r, 1);
        board.unshift(new Array(COLS).fill(null));
        lines++;
        r++;
      }

      if (lines > 0) {
        score += lines * 100;
        scoreEl.textContent = score;
        updateHighScore();

    level = Math.floor(score / 500) + 1;
    levelEl.textContent = level;
    dropInterval = Math.max(100, 600 - (level - 1) * 50);
  }
}

        const newLevel = Math.floor(score / 500) + 1;
        if (newLevel !== level) {
          level = newLevel;
          levelEl.textContent = level;
          dropInterval = Math.max(120, dropInterval - 40);
        }
      }
    }

    function lockPiece() {
      merge(board, current);
      clearLines();
      current = randomPiece();
      canHold = true;
      if (collide(board, current)) gameOver = true;
    }

    function update(time = 0) {
      if (gameOver) {
        ctx.fillStyle = "rgba(15,23,42,0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f97316";
        ctx.font = "bold 24px system-ui";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "16px system-ui";
        ctx.fillText("Tap Restart to play again", canvas.width / 2, canvas.height / 2 + 20);
        return;
      }

      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;

      if (dropCounter > dropInterval) {
        softDrop();
        dropCounter = 0;
      }

      drawBoard();
      requestAnimationFrame(update);
    }

    window.addEventListener("keydown", (e) => {
      if (gameOver) return;
      switch (e.key) {
        case "ArrowLeft": move(-1); break;
        case "ArrowRight": move(1); break;
        case "ArrowDown": softDrop(); break;
        case "ArrowUp":
        case "x":
        case "X": rotatePiece(); break;
        case " ": hardDrop(); break;
        case "c":
        case "C": holdCurrentPiece(); break;
      }
    });

    document.getElementById("btn-left").addEventListener("click", () => move(-1));
    document.getElementById("btn-right").addEventListener("click", () => move(1));
    document.getElementById("btn-down").addEventListener("click", () => softDrop());
    document.getElementById("btn-rot").addEventListener("click", () => rotatePiece());
    document.getElementById("btn-drop").addEventListener("click", () => hardDrop());
    document.getElementById("btn-hold").addEventListener("click", () => holdCurrentPiece());

    restartBtn.addEventListener("click", resetGame);
    document.getElementById("exit-btn").addEventListener("click", () => {
  window.location.href = "index.html";   // or your main menu file
});

    /* -----------------------------
   AUTO‑SCALE CANVAS TO SCREEN
------------------------------*/
function autoScale() {
  const container = document.getElementById("game-container");
  const maxWidth = window.innerWidth * 0.95;
  const scale = Math.min(maxWidth / container.offsetWidth, 1);
  container.style.transform = `scale(${scale})`;
}

window.addEventListener("resize", autoScale);
window.addEventListener("orientationchange", autoScale);


/* -----------------------------
   TOUCH‑HOLD REPEAT MOVEMENT
------------------------------*/
let holdInterval = null;

function startHold(action) {
  action(); // immediate move
  holdInterval = setInterval(action, 80); // repeat every 80ms
}

function stopHold() {
  clearInterval(holdInterval);
  holdInterval = null;
}

// LEFT HOLD
document.getElementById("btn-left").addEventListener("touchstart", e => {
  e.preventDefault();
  startHold(() => move(-1));
});
document.getElementById("btn-left").addEventListener("touchend", stopHold);

// RIGHT HOLD
document.getElementById("btn-right").addEventListener("touchstart", e => {
  e.preventDefault();
  startHold(() => move(1));
});
document.getElementById("btn-right").addEventListener("touchend", stopHold);

// DOWN HOLD (optional soft‑drop hold)
document.getElementById("btn-down").addEventListener("touchstart", e => {
  e.preventDefault();
  startHold(() => softDrop());
});
document.getElementById("btn-down").addEventListener("touchend", stopHold);


    resetGame();
  </script>
</body>
</html>
